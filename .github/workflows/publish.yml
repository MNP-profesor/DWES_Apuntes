name: Publicar apuntes DWES

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Quarto (con TinyTeX para PDF)
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Renderizar libro (HTML + PDF + EPUB)
        run: quarto render

      - name: Generar PDF por unidad
        run: bash scripts/build-ud-pdfs.sh

      - name: Organizar carpeta de descargas
        run: |
          mkdir -p _book/download
          mv _book/DWES-2DAW.pdf  _book/download/ 2>/dev/null || true
          mv _book/DWES-2DAW.epub _book/download/ 2>/dev/null || true
          cp _ud-pdfs/*.pdf _book/download/ 2>/dev/null || true
          echo "Contenido de descargas:"
          ls -1 _book/download

      - name: Subir artefacto para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
