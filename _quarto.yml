project:
  type: book
  output-dir: _book

lang: es

book:
  title: "Desarrollo Web en Entorno Servidor"
  subtitle: "2º DAW | Cód. Módulo 0613 | 200 horas"
  author: "Manel Navarro Pérez"
  #date: today
  #date-format: "MMMM YYYY"
  output-file: "DWES - 2º DAW"
  # ── Cambia USUARIO por tu usuario de GitHub ──
  repo-url: https://github.com/MNP-profesor/DWES_Apuntes
  repo-actions: [edit, issue]
  search: true
  sidebar:
    style: docked
    collapse-level: 1
  page-footer:
    left: "© Manel Navarro Pérez | CC BY-NC-SA 4.0"
    right: "DWES | 2º DAW | Módulo 0613"

  chapters:
    - index.qmd
    - descargas.qmd

    # ══════════════════════════════════════════════════════════
    # UNIDADES: al migrar cada UD, descomenta su bloque y
    # sustituye los ficheros por los reales de la unidad.
    # El capítulo de demostración (UD1/00-demo.qmd) se elimina
    # cuando llegue la UD1 real.
    # ══════════════════════════════════════════════════════════

