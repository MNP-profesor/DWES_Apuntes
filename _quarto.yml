format:
  html:
    theme:
      light: [flatly, theme/midnight-light.scss]
      dark: [darkly, theme/midnight-dark.scss]
    toc: true
    toc-depth: 3
    number-sections: true
    number-depth: 2
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    link-external-newwindow: true

  pdf:
    documentclass: scrreprt
    papersize: a4
    geometry:
      - top=2.5cm
      - bottom=2.5cm
      - left=2.5cm
      - right=2.2cm
    toc: true
    toc-depth: 2
    number-sections: true
    colorlinks: true
    linkcolor: MidnightCoral
    urlcolor: MidnightCoral
    highlight-style: tango
    code-block-bg: "#EFF3FB"
    include-in-header:
      - theme/pdf-header.tex
      - theme/pdf-portada.tex

  epub:
    toc: true
    number-sections: true
    epub-cover-image: theme/cover.png
